<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARIA — AI Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <div class="page">
    <div class="terminal-window">

      <!-- Titlebar: mimics the CLI roots of the project -->
      <div class="titlebar">
        <div class="dots">
          <span class="dot dot-red"></span>
          <span class="dot dot-yellow"></span>
          <span class="dot dot-green"></span>
        </div>
        <div class="titlebar-label">aria@groq: ~/chat</div>
        <div class="status">
          <span class="status-pulse"></span>
          <span>online</span>
        </div>
      </div>

      <!-- Header -->
      <div class="header">
        <div class="header-avatar">🤖</div>
        <div class="header-text">
          <h1>ARIA</h1>
          <p>AI Chatbot powered by Groq · LLaMA 3.3 70B</p>
        </div>
        <div class="header-actions">
          <select id="persona-select" class="persona-select" title="Ganti persona Aria">
            <option value="default">default</option>
            <option value="formal">formal</option>
            <option value="santai">santai</option>
            <option value="sarcastic">sarcastic</option>
            <option value="mentor">mentor</option>
          </select>
          <button id="upload-doc-btn" class="clear-btn" title="Upload dokumen (.txt/.pdf/.docx) ke knowledge base">
            📎 upload
          </button>
          <input type="file" id="doc-file-input" accept=".txt,.pdf,.docx" hidden />
          <button id="rag-toggle-btn" class="clear-btn" title="Toggle penggunaan knowledge base saat menjawab">
            📚 rag
          </button>
          <button id="speak-toggle-btn" class="clear-btn" title="Toggle Aria membacakan balasan dengan suara">
            🔇 speak
          </button>
          <button id="save-btn" class="clear-btn" title="Download conversation as .txt">
            💾 save
          </button>
          <button id="clear-btn" class="clear-btn" title="Clear conversation">
            clear
          </button>
        </div>
      </div>

      <!-- Chat log -->
      <div id="chat-log" class="chat-log">
        <div class="msg msg-system">
          <span class="msg-label">system</span>
          <p>Halo! Aku Aria 🤖. Ketik pesan di bawah untuk mulai ngobrol.</p>
        </div>
      </div>

      <!-- Input -->
      <form id="chat-form" class="chat-form">
        <span class="prompt-caret">&gt;</span>
        <button type="button" id="mic-btn" class="mic-btn" title="Rekam pesan suara (5 detik)">🎤</button>
        <input
          id="chat-input"
          type="text"
          autocomplete="off"
          placeholder="Tulis pesan untuk Aria..."
          maxlength="2000"
        />
        <button type="submit" class="send-btn">Send</button>
      </form>

    </div>

    <p class="footer-note">Riwayat percakapan disimpan sementara di server selama sesi browser ini aktif.</p>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
