<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARIA — AI Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <div class="app">

    <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

    <!-- ============ Sidebar ============ -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">🤖</div>
        <div class="brand-text">
          <h1>ARIA</h1>
          <p>Groq · LLaMA 3.3 70B</p>
        </div>
      </div>

      <button id="clear-btn" class="new-chat-btn" title="Hapus riwayat dan mulai percakapan baru">
        <span class="plus">＋</span> Percakapan Baru
      </button>

      <div class="side-section">
        <span class="side-label">Persona</span>
        <select id="persona-select" class="persona-select" title="Ganti persona Aria">
          <option value="default">Default</option>
          <option value="formal">Formal</option>
          <option value="santai">Santai</option>
          <option value="sarcastic">Sarcastic</option>
          <option value="mentor">Mentor</option>
        </select>
      </div>

      <div class="side-section">
        <span class="side-label">Alat &amp; Fitur</span>
        <div class="tool-list">
          <button id="tools-toggle-btn" class="tool-item is-on" title="Toggle tool calling (calculator + web search)">
            <span class="tool-icon">🛠️</span><span class="tool-name">Tools</span><span class="tool-state">On</span>
          </button>
          <button id="rag-toggle-btn" class="tool-item" title="Toggle penggunaan knowledge base saat menjawab">
            <span class="tool-icon">📚</span><span class="tool-name">Knowledge base</span><span class="tool-state">Off</span>
          </button>
          <!-- upload/regenerate/save intentionally have no tool-state span: they're actions, not on/off toggles -->

          <button id="upload-doc-btn" class="tool-item" title="Upload dokumen (.txt/.pdf/.docx) ke knowledge base">
            <span class="tool-icon">📎</span><span class="tool-name">Upload dokumen</span>
          </button>
          <input type="file" id="doc-file-input" accept=".txt,.pdf,.docx" hidden />
          <button id="speak-toggle-btn" class="tool-item" title="Toggle Aria membacakan balasan dengan suara">
            <span class="tool-icon">🔇</span><span class="tool-name">Bacakan balasan</span><span class="tool-state">Off</span>
          </button>
          <button id="regenerate-btn" class="tool-item" title="Generate ulang balasan terakhir Aria">
            <span class="tool-icon">🔄</span><span class="tool-name">Regenerasi balasan</span>
          </button>
          <button id="save-btn" class="tool-item" title="Download conversation as .txt">
            <span class="tool-icon">💾</span><span class="tool-name">Simpan percakapan</span>
          </button>
        </div>
      </div>

      <p class="sidebar-footer">Riwayat percakapan disimpan sementara selama sesi browser ini aktif.</p>
    </aside>

    <!-- ============ Main chat column ============ -->
    <main class="main">

      <div class="topbar">
        <button id="sidebar-toggle-btn" class="sidebar-toggle-btn" title="Buka menu" aria-label="Buka menu">☰</button>
        <div class="topbar-title">
          <h2>Ngobrol dengan Aria</h2>
          <span class="topbar-sub">Asisten AI serba bisa</span>
        </div>
        <div class="status">
          <span class="status-pulse"></span>
          <span>online</span>
        </div>
      </div>

      <div id="chat-log" class="chat-log">
        <div class="msg msg-system">
          <div class="msg-body">Halo! Aku Aria 🤖. Ketik pesan di bawah untuk mulai ngobrol.</div>
        </div>
      </div>

      <form id="chat-form" class="chat-form">
        <button type="button" id="mic-btn" class="pill-icon-btn" title="Rekam pesan suara (5 detik)">🎤</button>
        <input
          id="chat-input"
          type="text"
          autocomplete="off"
          placeholder="Tulis pesan untuk Aria..."
          maxlength="2000"
        />
        <button type="submit" class="send-btn" title="Kirim pesan" aria-label="Kirim pesan">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 12L20 4L13 20L11 13L4 12Z" fill="currentColor"/>
          </svg>
        </button>
      </form>

    </main>
  </div>

  <!-- marked: renders Aria's Markdown replies (code blocks, lists, etc.) as HTML.
       DOMPurify: sanitizes that HTML before it's inserted into the page, so a
       malicious RAG document or an unusual model reply can't smuggle in a
       <script> tag or similar — same defense-in-depth spirit as the RAG
       prompt-injection handling in chatbot_core.py. -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
